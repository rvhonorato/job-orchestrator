# `configmap.yaml` holds all configurations defined via system variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: job-orchestrator-config
  labels:
    app: job-orchestrator
    component: config
data:
  SERVER_DATA_PATH: "/opt/data"
  SERVER_DB_PATH: "/opt/data/db.sqlite"
  SERVER_PORT: "5000"
  SERVER_MAX_AGE: "864000"
  CLIENT_DATA_PATH: "/opt/data"
  CLIENT_DB_PATH: "/opt/data/db.sqlite"
  CLIENT_PORT: "9000"
  SERVICE_EXAMPLE_UPLOAD_URL: "http://job-orchestrator-client:9000/submit"
  SERVICE_EXAMPLE_DOWNLOAD_URL: "http://job-orchestrator-client:9000/retrieve"
  SERVICE_EXAMPLE_TERMINATE_URL: "http://job-orchestrator-client:9000/kill"
  SERVICE_EXAMPLE_RUNS_PER_USER: "5"
  SERVICE_EXAMPLE_MAX_RUNS: "10"
